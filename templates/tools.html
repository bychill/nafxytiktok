{% extends "base.html" %}

{% block content %}
<div class="box">

<h2>Image To Text</h2>

<form method="POST" enctype="multipart/form-data">
<input type="file" name="image">
<button>Generate</button>
</form>

{% if text %}
<textarea style="width:100%;height:100px;margin-top:10px;">{{ text }}</textarea>
{% endif %}

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

</div>
{% endblock %}
