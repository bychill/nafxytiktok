<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAFXY WEB</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    color:white;
    text-align:center;
    background: linear-gradient(135deg, #050510, #0a0f2c, #000);
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.glow1, .glow2{
    position:fixed;
    border-radius:50%;
    filter:blur(150px);
    z-index:-1;
}

.glow1{
    width:300px;
    height:300px;
    background:#00aaff;
    top:20%;
    left:10%;
}

.glow2{
    width:300px;
    height:300px;
    background:#ff0055;
    bottom:10%;
    right:10%;
}

.wrapper{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:300px;
    padding:20px;
    background:rgba(20,20,40,0.6);
    backdrop-filter:blur(10px);
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,170,255,0.5);
}

input, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:#00aaff;
    color:white;
}

.error{
    margin-top:10px;
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<canvas id="bg"></canvas>

<div class="wrapper">
{% block content %}{% endblock %}
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];

for(let i=0;i<40;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*2,
        speed: Math.random()*0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle="#00aaff";
        ctx.fill();

        p.y += p.speed;

        if(p.y > canvas.height){
            p.y = 0;
            p.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
